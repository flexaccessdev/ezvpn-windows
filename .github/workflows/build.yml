name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # The native ezvpn.dll / wintun.dll are only needed at RUNTIME, so the
      # solution compiles and the Core tests run without them.
      - name: Build solution
        run: dotnet build ezvpn-windows.slnx -c Release

      - name: Test
        run: dotnet test tests/Ezvpn.Core.Tests/Ezvpn.Core.Tests.csproj -c Release --no-build
